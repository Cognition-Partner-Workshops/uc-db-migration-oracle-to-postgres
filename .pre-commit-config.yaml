# Pre-commit hooks for the Oracle → PostgreSQL migration project.
# Oracle Forms development had no pre-commit equivalent — code was promoted
# manually via SQL*Plus scripts with no automated style enforcement.

repos:
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.0
    hooks:
      - id: sqlfluff-lint
        name: sqlfluff-lint (PostgreSQL)
        files: migrations/
        args:
          - --dialect
          - postgres
          - --config
          - .sqlfluff

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - -d
          - '{extends: relaxed, rules: {line-length: {max: 200}}}'
        files: \.(yml|yaml)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
