---
name: SQL Migration CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PGHOST: localhost
  PGPORT: "5432"
  PGDATABASE: hrms
  PGUSER: postgres
  PGPASSWORD: postgres
  NS: ci_${{ github.run_id }}

jobs:
  lint:
    name: Lint PL/pgSQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sqlfluff
        run: pip install "sqlfluff>=3.3.0"

      - name: Run sqlfluff lint
        run: |
          sqlfluff lint migrations/ \
            --dialect postgres \
            --config .sqlfluff || true
          # Non-blocking for now — linting is advisory.

  validate:
    name: Validate + Reconcile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hrms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Seed synthetic data
        run: python seed/generate_and_load.py --schema raw

      - name: Deploy migrations
        run: python seed/deploy.py --namespace "$NS" --migrations-dir migrations/

      - name: Run reconciliation report
        if: always()
        run: |
          python verify/reconcile.py \
            --namespace "$NS" \
            --raw-schema raw \
            --mode report \
            --output reconciliation-report.md

      - name: Gate on reconciliation controls
        run: |
          python verify/reconcile.py \
            --namespace "$NS" \
            --raw-schema raw \
            --mode test

      - name: Upload reconciliation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconciliation-report
          path: reconciliation-report.md

      - name: Teardown
        if: always()
        run: python seed/teardown.py --schema "$NS" || true
